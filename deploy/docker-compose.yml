services:
  clow:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${CLOW_PORT:-8001}:8001"
    env_file:
      - /root/.clow/app/.env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLOW_PROVIDER=${CLOW_PROVIDER:-anthropic}
      - CLOW_MODEL=${CLOW_MODEL:-claude-haiku-4-5-20251001}
      - CLOW_MODEL_HEAVY=${CLOW_MODEL_HEAVY:-claude-sonnet-4-20250514}
      - CLOW_ADMIN_EMAIL=${CLOW_ADMIN_EMAIL:-}
      - CLOW_API_KEY=${CLOW_API_KEY:-}
    volumes:
      - clow-data:/home/clow/.clow
      - /root/clow/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  clow-data:
