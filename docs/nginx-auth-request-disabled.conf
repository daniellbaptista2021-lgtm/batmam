server {
    server_name clow.pvcorretor01.com.br;

    # ── Reset completo: Clear-Site-Data header + HTML que limpa SW/caches/IDB via JS (funciona em PWA) ──
    location = /reset-cache {
        add_header Clear-Site-Data "\"cache\", \"cookies\", \"storage\", \"executionContexts\"" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        alias /var/www/clow-static/reset-cache.html;
        default_type text/html;
    }

    underscores_in_headers on;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # ========== CHATWOOT REVERSE PROXY (same-origin para evitar cookies third-party em iOS PWA) ==========
    # Os paths abaixo proxam para o Chatwoot em http://127.0.0.1:3000, com Host header
    # preservado como ads.pvcorretor01.com.br. Cookies sao reescritos pro Clow domain.
    # Um interceptor JS injetado no HTML reescreve fetch/XHR/WebSocket para prefixar /cw/.

    # Raiz do Chatwoot (redireciona pro login)
    location ^~ /cw/ {
        # DISABLED: auth_request /_clow_crm_authz;
        # DISABLED: error_page 401 403 = @crm_denied;
        rewrite ^/cw/(.*)$ /$1 break;
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # WebSocket ActionCable
    location = /cw/cable {
        # DISABLED: auth_request /_clow_crm_authz;
        # DISABLED: error_page 401 403 = @crm_denied;
        rewrite ^/cw/cable$ /cable break;
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # Login do Chatwoot (redireciona do /cw/ quando nao logado)
    location = /app/login {
        # DISABLED: auth_request /_clow_crm_authz;
        # DISABLED: error_page 401 403 = @crm_denied;
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # Dashboard / Accounts / Conversations (SPA do Chatwoot apos login)
    location ^~ /app/accounts/ {
        # DISABLED: auth_request /_clow_crm_authz;
        # DISABLED: error_page 401 403 = @crm_denied;
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # Reset password, signup, confirm, setup
    location ~* ^/app/(reset|signup|confirm|setup) {
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # Devise auth (sign_in, sign_out, token refresh)
    location ^~ /auth/ {
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # Assets Vue (webpack) do Chatwoot
    location ^~ /vite/ {
        include /etc/nginx/snippets/chatwoot-proxy-static.conf;
    }
    location ^~ /packs/ {
        include /etc/nginx/snippets/chatwoot-proxy-static.conf;
    }
    location ^~ /assets/ {
        include /etc/nginx/snippets/chatwoot-proxy-static.conf;
    }
    location ^~ /brand-assets/ {
        include /etc/nginx/snippets/chatwoot-proxy-static.conf;
    }
    # Icons/manifest do Chatwoot
    location ~* ^/(apple-icon|favicon|android-icon|ms-icon)-[0-9x]+\.(png|ico)$ {
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    location = /manifest.json {
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # Rails active_storage (uploads, avatares)
    location ^~ /rails/ {
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # WebSocket ActionCable (direto, sem prefix /cw/ — alguns JS usam absoluto)
    location = /cable {
        # DISABLED: auth_request /_clow_crm_authz;
        # DISABLED: error_page 401 403 = @crm_denied;
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # Widget + Hook (webhooks externos continuam funcionando via ads.pvcorretor01.com.br)
    location ^~ /widget/ {
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    location ^~ /enterprise/ {
        include /etc/nginx/snippets/chatwoot-proxy.conf;
    }
    # API v1 do Chatwoot - distingue do Clow via Referer (se vier de /cw/ ou /app/accounts)
    location ^~ /api/v1/ {
        # Se Referer e do Chatwoot, proxy pra ele. Senao, pro Clow.
        set $api_backend "http://127.0.0.1:8001";
        if ($http_referer ~* "clow\.pvcorretor01\.com\.br/(cw|app/accounts|app/login)") {
            set $api_backend "http://127.0.0.1:3000";
        }
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host ads.pvcorretor01.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
        proxy_cookie_domain ads.pvcorretor01.com.br clow.pvcorretor01.com.br;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        client_max_body_size 50M;
    }

    # pv-custom assets (script customizado do Chatwoot)
    location ~* ^/pv-custom.(js|css)$ {
        include /etc/nginx/snippets/chatwoot-proxy-static.conf;
    }

    # Proxy /downloads/ pro System Clow (arquivos gerados pelo Sonnet 4)
    location /downloads/ {
        proxy_pass https://system-clow.pvcorretor01.com.br;
        proxy_set_header Host system-clow.pvcorretor01.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
        proxy_read_timeout 60s;
        client_max_body_size 100M;
    }

    # ── Internal: subrequest pra Clow backend validar quem pode acessar /cw/ ──
    location = /_clow_crm_authz {
        internal;
        proxy_pass http://127.0.0.1:8001/api/v1/internal/crm/authz;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 3s;
        proxy_connect_timeout 2s;
    }

    location @crm_denied {
        # Limpa cookies Chatwoot no browser ao negar (defesa em profundidade)
        add_header Set-Cookie "cw_d_session=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; HttpOnly; Secure; SameSite=Lax" always;
        add_header Set-Cookie "_chatwoot_session=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; HttpOnly; Secure; SameSite=Lax" always;
        add_header Set-Cookie "access_token=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; HttpOnly; Secure; SameSite=Lax" always;
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header X-Clow-Denied "crm_not_authorized" always;
        return 403 '{"error":"crm_not_authorized","message":"Voce nao tem permissao pra acessar este CRM. Configure sua conexao no onboarding."}';
    }

    # ========== CLOW ==========
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;
        client_max_body_size 20M;
        proxy_buffering off;
        proxy_cache off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/clow.pvcorretor01.com.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/clow.pvcorretor01.com.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = clow.pvcorretor01.com.br) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name clow.pvcorretor01.com.br;
    return 404;
}
