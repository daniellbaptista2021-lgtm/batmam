<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Clow — Infraestrutura</title>
<link rel="icon" href="/static/brand/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050510;--bg2:#0A0A1A;--bg3:#0F0F24;--bg4:#14142E;--bd:rgba(100,100,180,.1);--p:#9B59FC;--bl:#4A9EFF;--gp:linear-gradient(135deg,#9B59FC,#4A9EFF);--g:#34D399;--r:#F87171;--t1:#E8E8F0;--t2:#9898B8;--tm:#585878;--sans:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
.top{display:flex;align-items:center;gap:12px;padding:16px 24px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.top img{height:32px}
.top h1{font-size:1.1rem;font-weight:600;flex:1}
.top .back{font-size:.85rem;color:var(--t2);text-decoration:none;padding:6px 14px;border:1px solid var(--bd);border-radius:6px}
.top .back:hover{color:var(--t1);border-color:var(--p)}
.wrap{max-width:800px;margin:28px auto;padding:0 20px}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:14px}
.card h3{font-size:.95rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card h3 .dot.on{background:var(--g)}
.card h3 .dot.off{background:var(--r)}
.row{display:flex;gap:8px;margin-bottom:6px;font-size:.85rem}
.row .lbl{color:var(--tm);min-width:140px;flex-shrink:0}
.row .val{color:var(--t2);font-family:var(--mono);word-break:break-all}
.row .val.secret{color:var(--r);font-size:.8rem}
.reload{background:var(--gp);color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:var(--sans);font-weight:600;margin-top:12px}
</style>
</head>
<body>
<div class="top">
  <img src="/static/brand/logo-sidebar.png" alt="Clow">
  <h1>Infraestrutura (Admin)</h1>
  <a class="back" href="/">Voltar</a>
</div>
<div class="wrap" id="content">
  <p style="color:var(--tm);text-align:center;padding:40px">Carregando...</p>
</div>
<script>
async function load(){
  const r=await fetch('/api/v1/admin/infrastructure');
  const d=await r.json();
  if(d.error){document.getElementById('content').innerHTML='<p style="color:var(--r)">'+d.error+'</p>';return}
  const s=d.services||{};
  let h='';
  for(const[name,svc] of Object.entries(s)){
    const on=svc.status==='ok';
    h+=`<div class="card"><h3><span class="dot ${on?'on':'off'}"></span>${esc(name)}</h3>`;
    for(const[k,v] of Object.entries(svc)){
      if(k==='status')continue;
      const isSec=k.includes('token')||k.includes('key')||k.includes('secret')||k.includes('password');
      h+=`<div class="row"><span class="lbl">${esc(k)}</span><span class="val${isSec?' secret':''}">${esc(String(v))}</span></div>`;
    }
    h+='</div>';
  }
  if(d.env){
    h+='<div class="card"><h3>Variaveis de Ambiente</h3>';
    for(const[k,v] of Object.entries(d.env)){
      h+=`<div class="row"><span class="lbl">${esc(k)}</span><span class="val secret">${esc(v)}</span></div>`;
    }
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
load();
</script>
</body>
</html>
