<linearGradient id="sbGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9B59FC"/><stop offset="100%" stop-color="#4A9EFF"/></linearGradient>

    <div class="sb-sec"><button class="sb-new" onclick="newConv()" aria-label="Iniciar nova conversa">+ Nova Conversa</button></div>

    <!-- CRM BLOCK -->
    <div class="sb-sec" id="crmBlock" style="padding:0 12px">
      <div style="background:rgba(155,89,252,.06);border:1px solid rgba(155,89,252,.12);border-radius:12px;padding:14px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9B59FC" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <span style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t1)">CRM</span>
          <span id="crmStatus" style="width:6px;height:6px;border-radius:50%;background:#4ADE80;display:inline-block;margin-left:2px"></span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div style="text-align:center;padding:8px 4px;background:rgba(0,0,0,.15);border-radius:8px">
            <div id="crmOpen" style="font-size:18px;font-weight:600;color:#FBBF24">--</div>
            <div style="font-size:9px;color:var(--t2);margin-top:2px">Abertas</div>
          </div>
          <div style="text-align:center;padding:8px 4px;background:rgba(0,0,0,.15);border-radius:8px">
            <div id="crmContacts" style="font-size:18px;font-weight:600;color:var(--t1)">--</div>
            <div style="font-size:9px;color:var(--t2);margin-top:2px">Contatos</div>
          </div>
          <div style="text-align:center;padding:8px 4px;background:rgba(0,0,0,.15);border-radius:8px">
            <div id="crmPending" style="font-size:18px;font-weight:600;color:#F87171">--</div>
            <div style="font-size:9px;color:var(--t2);margin-top:2px">Aguardando</div>
          </div>
          <div style="text-align:center;padding:8px 4px;background:rgba(0,0,0,.15);border-radius:8px">
            <div id="crmResolved" style="font-size:18px;font-weight:600;color:#4ADE80">--</div>
            <div style="font-size:9px;color:var(--t2);margin-top:2px">Resolvidas hoje</div>
          </div>
        </div>
        <a href="/crm" target="_blank" style="display:block;text-align:center;margin-top:10px;padding:7px;background:rgba(155,89,252,.1);border:1px solid rgba(155,89,252,.2);border-radius:8px;color:#9B59FC;font-size:11px;font-weight:600;text-decoration:none;transition:all .2s" onmouseover="this.style.background='rgba(155,89,252,.2)'" onmouseout="this.style.background='rgba(155,89,252,.1)'">Ver CRM completo &rarr;</a>
      </div>
    </div>

    <div class="sb-sep"></div>

    <div class="on-badge" id="onBdg" aria-live="polite"><span class="on-dot"></span><span id="onLbl">online</span></div>

    </div>
  </div>
  <div class="term" id="term">

      <div class="ibox-right">
        <button class="mic-btn vis" id="micBtn" onclick="toggleRec()" title="Gravar áudio" aria-label="Gravar áudio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
        <button class="sbtn" id="sBtn" onclick="sendMessage()" aria-label="Enviar mensagem"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
        <button class="stop-btn" id="stopBtn" onclick="stopGeneration()" aria-label="Parar geração"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg></button>
      </div>
    </div>
  </div>
  <div class="lightbox" id="lightbox" onclick="closeLightbox()"><button class="lb-close" onclick="closeLightbox()">&times;</button><img id="lbImg" src=""></div>
</div>

<script>
/* Menu dropdown — funciona independente do chat.js */
(function(){
  var drop=document.getElementById('hdrDrop');
  var btn=document.getElementById('menuBtn');
  if(btn&&drop){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      drop.classList.toggle('show');
    });
    document.addEventListener('click',function(e){
      if(!e.target.closest('.hdr-menu'))drop.classList.remove('show');
    });
  }
  /* Sidebar toggle */
  window.toggleSB=function(){
    var s=document.getElementById('sb'),o=document.getElementById('sbOv');
    if(s)s.classList.toggle('open');if(o)o.classList.toggle('show');
  };
  /* Compat com chat.js */
  window.togDrop=function(){if(drop)drop.classList.toggle('show')};
  window.clsDrop=function(){if(drop)drop.classList.remove('show')};
})();
</script>
<script>
// CRM Metrics Polling via Clow proxy
(function(){
  function fetchCRM(){
    fetch('/api/v1/crm/sidebar-stats').then(function(r){return r.json()}).then(function(d){
      if(!d.ok)throw new Error();
      document.getElementById('crmOpen').textContent=d.open||0;
      document.getElementById('crmContacts').textContent=d.contacts||0;
      document.getElementById('crmPending').textContent=d.pending||0;
      document.getElementById('crmResolved').textContent=d.resolved||0;
      document.getElementById('crmOpen').style.color=(d.open>0)?'#FBBF24':'var(--t1)';
      document.getElementById('crmPending').style.color=(d.pending>0)?'#F87171':'var(--t1)';
      document.getElementById('crmStatus').style.background='#4ADE80';
    }).catch(function(){
      document.getElementById('crmStatus').style.background='#F87171';
    });
  }
  fetchCRM();
  setInterval(fetchCRM,60000);
})();
</script>
