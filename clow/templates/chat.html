<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="Clow - AI Code Agent">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" href="/static/brand/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/static/brand/apple-touch-icon.png">
<title>Clow</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>
<!-- Drawer overlay -->
<div class="drawer-ov" id="drawerOv" onclick="closeDrawer()"></div>

<!-- Drawer menu -->
<aside class="drawer" id="drawer">
  <div class="drawer-head">
    <img src="/static/brand/logo-sidebar.png" alt="Clow" class="drawer-logo">
    <button class="drawer-close" onclick="closeDrawer()">&times;</button>
  </div>
  <button class="drawer-btn new" onclick="newConv();closeDrawer()">+ nova conversa</button>
  <div class="drawer-search">
    <input type="text" id="convSearchInp" placeholder="buscar conversas..." oninput="filterConvs(this.value)">
  </div>
  <div class="drawer-convs" id="convList"></div>
  <div class="drawer-sep"></div>
  <div class="drawer-section">
    <div class="drawer-label">criar</div>
    <button class="drawer-btn" onclick="qa('Cria uma landing page de ');closeDrawer()">landing page</button>
    <button class="drawer-btn" onclick="qa('Gera uma planilha de ');closeDrawer()">planilha</button>
    <button class="drawer-btn" onclick="qa('Cria uma apresentação sobre ');closeDrawer()">apresentacao</button>
    <button class="drawer-btn" onclick="qa('Faz um documento de ');closeDrawer()">documento</button>
    <button class="drawer-btn" onclick="qa('Me faz um app de ');closeDrawer()">web app</button>
  </div>
  <div class="drawer-sep"></div>
  <div class="drawer-section">
    <div class="drawer-label">marketing</div>
    <button class="drawer-btn" onclick="qa('Analise minha campanha de tráfego pago ');closeDrawer()">trafego pago</button>
    <button class="drawer-btn" onclick="qa('Gera copy para anúncio de ');closeDrawer()">copy</button>
    <button class="drawer-btn" onclick="qa('Cria conteúdo para instagram sobre ');closeDrawer()">redes sociais</button>
    <button class="drawer-btn" onclick="qa('Faz auditoria SEO de ');closeDrawer()">seo</button>
  </div>
  <div class="drawer-sep"></div>
  <div class="drawer-section">
    <div class="drawer-label">negocios</div>
    <button class="drawer-btn" onclick="qa('Cria proposta comercial para ');closeDrawer()">proposta</button>
    <button class="drawer-btn" onclick="qa('Cria contrato de ');closeDrawer()">contrato</button>
    <button class="drawer-btn" onclick="qa('Analise métricas SaaS: ');closeDrawer()">metricas saas</button>
  </div>
  <div class="drawer-sep"></div>
  <div class="drawer-section" id="admSec" style="display:none">
    <div class="drawer-label">admin</div>
    <button class="drawer-btn" onclick="showAdmUsers();closeDrawer()">usuarios</button>
    <button class="drawer-btn" onclick="showAdmStats();closeDrawer()">consumo</button>
    <button class="drawer-btn" onclick="showCreateUsr();closeDrawer()">cadastrar</button>
  </div>
  <div class="drawer-foot">
    <span class="drawer-user" id="sbEm">...</span>
    <span class="drawer-plan" id="sbPl">...</span>
  </div>
</aside>

<!-- Main terminal -->
<div class="terminal">
  <div class="topbar">
    <button class="ham" onclick="openDrawer()">&#9776;</button>
    <img src="/static/brand/logo-sidebar.png" alt="Clow" class="topbar-logo">
    <span class="topbar-title" id="hdrT">clow</span>
    <div class="topbar-right">
      <span class="topbar-model">sonnet</span>
      <span class="topbar-status"><span class="dot" id="onBdg"></span><span id="onLbl">online</span></span>
      <button class="topbar-menu" onclick="togDrop()">...</button>
      <div class="topbar-drop" id="hdrDrop">
        <button onclick="sendCmd('/usage');clsDrop()">consumo</button>
        <button onclick="sendCmd('/help');clsDrop()">ajuda</button>
        <button onclick="sendCmd('/memories');clsDrop()">memorias</button>
        <a href="/logout">sair</a>
      </div>
    </div>
  </div>
  <!-- Hidden elements for compat -->
  <div id="sbAv" style="display:none"></div>
  <select id="modSel" style="display:none"><option value="sonnet">Sonnet</option></select>

  <div class="output" id="term">
    <div class="welc" id="welc">
      <div class="welc-ascii">System Clow v0.2.0</div>
      <div class="welc-sub">sonnet 4.5 · /help</div>
    </div>
  </div>

  <div class="drag-overlay" id="dragOv">solte o arquivo aqui</div>

  <div class="prompt-area">
    <div id="filePreview"></div>
    <div class="prompt-box">
      <span class="prompt-char">&#x276F;</span>
      <button class="prompt-attach" id="attachBtn" onclick="toggleAttachMenu()" title="anexar">+</button>
      <div class="attach-menu" id="attachMenu" style="display:none">
        <button class="am-item" onclick="pickFile('image/*','.jpg,.jpeg,.png,.gif,.webp')">imagem</button>
        <button class="am-item" onclick="pickFile('','.pdf,.docx,.doc,.txt,.md')">documento</button>
        <button class="am-item" onclick="pickFile('','.xlsx,.xls,.csv')">planilha</button>
        <button class="am-item" onclick="pickFile('','*')">arquivo</button>
      </div>
      <label for="inp" class="sr-only">prompt</label>
      <textarea id="inp" rows="1" placeholder="" autofocus></textarea>
      <button class="prompt-mic" id="micBtn" onclick="toggleRec()" title="gravar"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg></button>
      <button class="prompt-send" id="sBtn" onclick="sendMessage()">&#x21B5;</button>
      <button class="stop-btn" id="stopBtn" onclick="stopGeneration()">&#x25A0;</button>
    </div>
  </div>
  <div class="lightbox" id="lightbox" onclick="closeLightbox()"><button class="lb-close" onclick="closeLightbox()">&times;</button><img id="lbImg" src=""></div>
</div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)clsModal()"><div class="modal" id="modalC"></div></div>
<script>
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawerOv').classList.add('show')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOv').classList.remove('show')}
// Compat aliases
function toggleSB(){document.getElementById('drawer').classList.contains('open')?closeDrawer():openDrawer()}
</script>
<script src="/static/js/chat.js"></script>
</body>
</html>
