<script>
/* Menu dropdown — funciona independente do chat.js */
(function(){
  var drop=document.getElementById('hdrDrop');
  var btn=document.getElementById('menuBtn');
  if(btn&&drop){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      drop.classList.toggle('show');
    });
    document.addEventListener('click',function(e){
      if(!e.target.closest('.hdr-menu'))drop.classList.remove('show');
    });
  }
  /* Sidebar toggle */
  window.toggleSB=function(){
    var s=document.getElementById('sb'),o=document.getElementById('sbOv');
    if(s)s.classList.toggle('open');if(o)o.classList.toggle('show');
  };
  /* Compat com chat.js */
  window.togDrop=function(){if(drop)drop.classList.toggle('show')};
  window.clsDrop=function(){if(drop)drop.classList.remove('show')};
})();
</script>

})();
