<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050510">
<link rel="icon" type="image/png" href="/static/brand/favicon.png">
<title>CRM — Clow</title>
<style>
:root {
  --bg: #050510; --bg2: #0a0a1a; --border: #1a1a2e; --border2: #2a2a4e;
  --t1: #e4e4e7; --t2: #71717a; --p: #7c5cfc; --p-dim: rgba(124,92,252,.15);
  --green: #22c55e; --red: #ef4444; --yellow: #ffb800; --blue: #1f93ff;
  --orange: #f97316; --radius: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:var(--t1)}
input,select,textarea{font-family:inherit;background:var(--bg);color:var(--t1);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--p)}
select{cursor:pointer}
textarea{resize:vertical;min-height:80px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);height:44px;flex-shrink:0;position:sticky;top:0;z-index:100}
.top-left{display:flex;align-items:center;gap:10px}
.top-left img{height:24px}
.top-left .label{font-weight:700;font-size:15px;color:var(--p)}
.back-link{color:var(--t2);font-size:13px;transition:color .2s}
.back-link:hover{color:var(--t1)}

/* Tabs */
.tabs{display:flex;gap:6px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;color:var(--t2);background:transparent;border:1px solid transparent;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--t1);background:var(--p-dim)}
.tab.active{color:#fff;background:var(--p);border-color:var(--p)}

/* Main content */
.main{padding:16px;min-height:calc(100vh - 96px)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg2);color:var(--t1);transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--p);color:#fff}
.btn-p{background:var(--p);border-color:var(--p);color:#fff}
.btn-p:hover{background:#6b4ce0}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.15)}

/* Cards */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-card .val{font-size:28px;font-weight:700}
.stat-card .lbl{font-size:12px;color:var(--t2);margin-top:2px}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--t2);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,92,252,.03)}

/* Badge */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-novo{background:rgba(255,184,0,.15);color:var(--yellow)}
.badge-contatado{background:rgba(31,147,255,.15);color:var(--blue)}
.badge-qualificado{background:var(--p-dim);color:var(--p)}
.badge-proposta{background:rgba(249,115,22,.15);color:var(--orange)}
.badge-ganho{background:rgba(34,197,94,.15);color:var(--green)}
.badge-perdido{background:rgba(239,68,68,.15);color:var(--red)}
.badge-draft{background:rgba(113,113,122,.15);color:var(--t2)}
.badge-sending{background:rgba(255,184,0,.15);color:var(--yellow)}
.badge-sent{background:rgba(34,197,94,.15);color:var(--green)}
.badge-scheduled{background:rgba(31,147,255,.15);color:var(--blue)}
.badge-alta{background:rgba(239,68,68,.15);color:var(--red)}
.badge-media{background:rgba(255,184,0,.15);color:var(--yellow)}
.badge-baixa{background:rgba(113,113,122,.15);color:var(--t2)}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;overflow-x:auto;padding-bottom:12px;min-height:400px}
.kanban-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);min-width:200px;display:flex;flex-direction:column;max-height:calc(100vh - 160px)}
.kanban-col.drag-over{border-color:var(--p);background:var(--p-dim)}
.kcol-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kcol-header .dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0}
.kcol-header .name{font-size:13px;font-weight:600;display:flex;align-items:center}
.kcol-header .cnt{font-size:11px;color:var(--t2);background:var(--bg);padding:1px 7px;border-radius:10px}
.kcol-body{padding:8px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.kcard{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:grab;transition:all .15s;font-size:12px}
.kcard:hover{border-color:var(--border2)}
.kcard.dragging{opacity:.4;border-color:var(--p)}
.kcard .kname{font-weight:600;font-size:13px;margin-bottom:4px;word-break:break-word}
.kcard .kinfo{color:var(--t2);display:flex;align-items:center;gap:4px;margin-bottom:2px}
.kcard .kdays{color:var(--t2);font-size:11px;margin-top:4px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:24px}
.modal-lg{max-width:720px}
.modal h2{font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal .field{margin-bottom:12px}
.modal .field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px}
.modal .field input,.modal .field select,.modal .field textarea{width:100%}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* Timeline */
.timeline{margin-top:16px;border-top:1px solid var(--border);padding-top:12px}
.timeline h3{font-size:14px;margin-bottom:10px;color:var(--t2)}
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;line-height:1.6}
.tl-body{flex:1;min-width:0}
.tl-body .tl-text{font-size:13px;word-break:break-word}
.tl-body .tl-time{font-size:11px;color:var(--t2);margin-top:2px}

/* Lead detail header */
.lead-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.lead-header .lead-name{font-size:18px;font-weight:700}
.lead-contact{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px}
.lead-contact span{color:var(--t2)}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:flex-end}
.quick-actions select,.quick-actions input{font-size:13px}

/* Campaign cards */
.camp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.camp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .2s}
.camp-card:hover{border-color:var(--border2)}
.camp-card .camp-name{font-weight:600;font-size:15px;margin-bottom:4px}
.camp-card .camp-subject{color:var(--t2);font-size:13px;margin-bottom:8px}
.camp-card .camp-stats{display:flex;gap:12px;font-size:12px;color:var(--t2)}
.camp-card .camp-stats b{color:var(--t1)}
.camp-card .camp-actions{display:flex;gap:6px;margin-top:10px}

/* Scheduling */
.sched-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.sched-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.sched-section h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.slink-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
.slink-item:last-child{border-bottom:none}
.slink-info{flex:1;min-width:0}
.slink-info .slink-title{font-weight:600;font-size:13px}
.slink-info .slink-url{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slink-dur{font-size:11px;color:var(--t2)}
.appt-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;gap:8px}
.appt-item:last-child{border-bottom:none}
.appt-left{flex:1;min-width:0}
.appt-left .appt-name{font-weight:600}
.appt-left .appt-email{color:var(--t2);font-size:12px}
.appt-date{color:var(--t2);font-size:12px;white-space:nowrap}

/* Dashboard suggestions */
.sugg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}
.sugg-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.sugg-card .sugg-title{font-weight:600;font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.sugg-card .sugg-desc{font-size:13px;color:var(--t2);margin-bottom:10px}

/* Bar chart */
.bar-chart{margin-bottom:20px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{width:100px;text-align:right;font-size:12px;font-weight:600;flex-shrink:0}
.bar-track{flex:1;height:24px;background:var(--bg);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .5s;min-width:2px}
.bar-val{font-size:12px;color:var(--t2);width:40px;flex-shrink:0}

/* Pagination */
.pagination{display:flex;gap:4px;justify-content:center;margin-top:16px;align-items:center}
.pagination button{padding:6px 12px;font-size:12px}

/* Toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar input,.toolbar select{font-size:13px;padding:6px 10px}
.toolbar .search-input{min-width:200px;flex:1;max-width:320px}

/* Toast */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:500;animation:slideIn .3s;max-width:360px}
.toast-ok{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.toast-err{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Spinner */
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Source icons */
.src-icon{font-size:14px}

/* Responsive */
@media(max-width:900px){
  .kanban{grid-template-columns:1fr;overflow-x:visible}
  .kanban-col{max-height:300px}
  .sched-grid{grid-template-columns:1fr}
  .lead-contact{grid-template-columns:1fr}
}
@media(max-width:600px){
  .stat-cards{grid-template-columns:1fr 1fr}
  .tabs{gap:4px;padding:8px 12px}
  .tab{padding:5px 10px;font-size:12px}
  .main{padding:10px}
  .camp-grid{grid-template-columns:1fr}
  .sugg-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <a class="back-link" href="/">&larr; voltar</a>
    <img src="/static/brand/logo-sidebar.png" alt="Clow">
    <span class="label">CRM</span>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="pipeline">Pipeline</button>
  <button class="tab" data-tab="leads">Leads</button>
  <button class="tab" data-tab="campanhas">Campanhas</button>
  <button class="tab" data-tab="agendamentos">Agendamentos</button>
  <button class="tab" data-tab="dashboard">Dashboard</button>
</div>

<div class="main">
  <!-- PIPELINE -->
  <div class="tab-content active" id="tc-pipeline">
    <div class="kanban" id="kanban"></div>
  </div>

  <!-- LEADS -->
  <div class="tab-content" id="tc-leads">
    <div class="toolbar">
      <input class="search-input" type="text" id="leadSearch" placeholder="Buscar leads...">
      <select id="filterStatus">
        <option value="">Todos Status</option>
        <option value="novo">Novo</option>
        <option value="contatado">Contatado</option>
        <option value="qualificado">Qualificado</option>
        <option value="proposta">Proposta</option>
        <option value="ganho">Ganho</option>
        <option value="perdido">Perdido</option>
      </select>
      <select id="filterSource">
        <option value="">Todas Fontes</option>
        <option value="manual">Manual</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="landing_page">Landing Page</option>
        <option value="agendamento">Agendamento</option>
      </select>
      <button class="btn btn-p" onclick="openNewLeadModal()">+ Novo Lead</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Nome</th><th>Email</th><th>Telefone</th><th>Fonte</th><th>Status</th><th>Ultimo contato</th><th>Acoes</th></tr></thead>
        <tbody id="leadsBody"><tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
      </table>
    </div>
    <div class="pagination" id="leadsPagination"></div>
  </div>

  <!-- CAMPANHAS -->
  <div class="tab-content" id="tc-campanhas">
    <div class="toolbar">
      <button class="btn btn-p" onclick="openNewCampaignModal()">+ Nova Campanha</button>
    </div>
    <div class="camp-grid" id="campGrid"><div class="loading"><div class="spinner"></div></div></div>
  </div>

  <!-- AGENDAMENTOS -->
  <div class="tab-content" id="tc-agendamentos">
    <div class="sched-grid">
      <div class="sched-section">
        <h3>Links de Agendamento <button class="btn btn-sm btn-p" onclick="openNewLinkModal()">+ Novo Link</button></h3>
        <div id="schedLinks"><div class="loading"><div class="spinner"></div></div></div>
      </div>
      <div class="sched-section">
        <h3>Proximos Agendamentos</h3>
        <div style="margin-bottom:10px"><input type="date" id="apptDateFilter" onchange="loadAppointments()"></div>
        <div id="apptList"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="tab-content" id="tc-dashboard">
    <div class="stat-cards" id="dashCards"></div>
    <h3 style="font-size:15px;margin-bottom:10px">Leads por Status</h3>
    <div class="bar-chart" id="dashChart"></div>
    <h3 style="font-size:15px;margin-bottom:10px">Sugestoes da IA</h3>
    <div class="sugg-grid" id="suggGrid"><div class="loading"><div class="spinner"></div></div></div>
    <h3 style="font-size:15px;margin:20px 0 10px">Leads sem Contato</h3>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Nome</th><th>Telefone</th><th>Dias inativo</th></tr></thead>
        <tbody id="staleBody"><tr><td colspan="3" style="color:var(--t2);text-align:center;padding:20px">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = '/api/v1/crm';
const STATUSES = ['novo','contatado','qualificado','proposta','ganho','perdido'];
const STATUS_COLORS = {novo:'#ffb800',contatado:'#1f93ff',qualificado:'#7c5cfc',proposta:'#f97316',ganho:'#22c55e',perdido:'#ef4444'};
const STATUS_LABELS = {novo:'Novo',contatado:'Contatado',qualificado:'Qualificado',proposta:'Proposta',ganho:'Ganho',perdido:'Perdido'};
const SOURCE_ICONS = {manual:'✏️',whatsapp:'💬',landing_page:'🌐',agendamento:'📅'};
const ACTIVITY_ICONS = {note:'📝',whatsapp:'💬',email:'📧',call:'📞',meeting:'📅',status_change:'🔄'};
const CAMP_BADGE = {draft:'draft',sending:'sending',sent:'sent',scheduled:'scheduled'};

/* ── Utility ── */
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function fmtDate(d){if(!d)return'—';const dt=new Date(d);if(isNaN(dt))return esc(d);const pad=n=>String(n).padStart(2,'0');return`${pad(dt.getDate())}/${pad(dt.getMonth()+1)}/${dt.getFullYear()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;}
function daysSince(d){if(!d)return'?';const ms=Date.now()-new Date(d).getTime();return Math.max(0,Math.floor(ms/86400000));}
function toast(msg,ok=true){const t=document.createElement('div');t.className='toast '+(ok?'toast-ok':'toast-err');t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3500);}

async function api(path,opts={}){
  const o={credentials:'same-origin',...opts};
  if(o.body&&typeof o.body==='object'&&!(o.body instanceof FormData)){o.body=JSON.stringify(o.body);o.headers={...o.headers,'Content-Type':'application/json'};}
  const r=await fetch(API+path,o);
  if(!r.ok){const e=await r.text().catch(()=>'');throw new Error(e||`HTTP ${r.status}`);}
  if(r.status===204)return null;
  return r.json();
}

/* ── Tabs ── */
let currentTab='pipeline';
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    currentTab=t.dataset.tab;
    document.getElementById('tc-'+currentTab).classList.add('active');
    loadTab(currentTab);
  });
});
function loadTab(tab){
  if(tab==='pipeline')loadPipeline();
  else if(tab==='leads')loadLeads();
  else if(tab==='campanhas')loadCampaigns();
  else if(tab==='agendamentos'){loadSchedLinks();loadAppointments();}
  else if(tab==='dashboard')loadDashboard();
}

/* ── Modal helpers ── */
function openModal(html,lg){
  const m=document.getElementById('modalContent');
  m.innerHTML=html;
  m.className='modal'+(lg?' modal-lg':'');
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ══════════════════════════════════════════════
   TAB 1: PIPELINE (Kanban)
   ══════════════════════════════════════════════ */
let pipelineData={};
async function loadPipeline(){
  const kb=document.getElementById('kanban');
  kb.innerHTML='<div class="loading" style="grid-column:1/-1"><div class="spinner"></div></div>';
  try{
    const data=await api('/leads');
    const leads=Array.isArray(data)?data:(data.leads||data.items||[]);
    pipelineData={};
    STATUSES.forEach(s=>pipelineData[s]=[]);
    leads.forEach(l=>{const s=(l.status||'novo').toLowerCase();if(pipelineData[s])pipelineData[s].push(l);else pipelineData.novo.push(l);});
    renderKanban();
  }catch(e){kb.innerHTML=`<p style="color:var(--red);grid-column:1/-1">Erro ao carregar pipeline: ${esc(e.message)}</p>`;}}

function renderKanban(){
  const kb=document.getElementById('kanban');
  kb.innerHTML='';
  STATUSES.forEach(status=>{
    const col=document.createElement('div');
    col.className='kanban-col';
    col.dataset.status=status;
    const cards=pipelineData[status]||[];
    col.innerHTML=`<div class="kcol-header"><span class="name"><span class="dot" style="background:${STATUS_COLORS[status]}"></span>${esc(STATUS_LABELS[status])}</span><span class="cnt">${cards.length}</span></div><div class="kcol-body"></div>`;
    const body=col.querySelector('.kcol-body');
    cards.forEach(lead=>{
      const card=document.createElement('div');
      card.className='kcard';
      card.draggable=true;
      card.dataset.id=lead.id;
      const contact=lead.phone||lead.email||'';
      const srcIcon=SOURCE_ICONS[lead.source]||'📋';
      const days=daysSince(lead.last_contact||lead.updated_at);
      card.innerHTML=`<div class="kname">${esc(lead.name)}</div><div class="kinfo"><span class="src-icon">${srcIcon}</span> ${esc(contact)}</div><div class="kdays">${days}d sem contato</div>`;
      card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',lead.id);e.dataTransfer.effectAllowed='move';card.classList.add('dragging');});
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
      card.addEventListener('click',()=>openLeadDetail(lead.id));
      body.appendChild(card);
    });
    col.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';col.classList.add('drag-over');});
    col.addEventListener('dragleave',()=>col.classList.remove('drag-over'));
    col.addEventListener('drop',async e=>{
      e.preventDefault();col.classList.remove('drag-over');
      const leadId=e.dataTransfer.getData('text/plain');
      if(!leadId)return;
      try{
        await api(`/leads/${leadId}/status`,{method:'PUT',body:{status}});
        toast(`Lead movido para ${STATUS_LABELS[status]}`);
        loadPipeline();
      }catch(err){toast('Erro ao mover lead: '+err.message,false);}
    });
    kb.appendChild(col);
  });
}

let leadsPage=1;let searchTimeout=null;
document.getElementById('leadSearch').addEventListener('input',()=>{clearTimeout(searchTimeout);searchTimeout=setTimeout(()=>{leadsPage=1;loadLeads();},300);});
document.getElementById('filterStatus').addEventListener('change',()=>{leadsPage=1;loadLeads();});
document.getElementById('filterSource').addEventListener('change',()=>{leadsPage=1;loadLeads();});

async function loadLeads(){
  const tbody=document.getElementById('leadsBody');
  tbody.innerHTML='<tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr>';
  const search=document.getElementById('leadSearch').value.trim();
  const status=document.getElementById('filterStatus').value;
  const source=document.getElementById('filterSource').value;
  let q=`/leads?page=${leadsPage}`;
  if(search)q+=`&search=${encodeURIComponent(search)}`;
  if(status)q+=`&status=${status}`;
  if(source)q+=`&source=${source}`;
  try{
    const data=await api(q);
    const leads=Array.isArray(data)?data:(data.leads||data.items||[]);
    const total=data.total||leads.length;
    const perPage=data.per_page||20;
    if(leads.length===0){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--t2);padding:20px">Nenhum lead encontrado</td></tr>';document.getElementById('leadsPagination').innerHTML='';return;}
    tbody.innerHTML='';
    leads.forEach(l=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td><strong>${esc(l.name)}</strong></td>
        <td>${esc(l.email||'—')}</td>
        <td>${esc(l.phone||'—')}</td>
        <td>${SOURCE_ICONS[l.source]||''} ${esc(l.source||'—')}</td>
        <td><span class="badge badge-${esc(l.status)}">${esc(STATUS_LABELS[l.status]||l.status)}</span></td>
        <td>${fmtDate(l.last_contact||l.updated_at)}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-sm" onclick="openLeadDetail(${esc(String(l.id))})" title="Ver">👁</button>
          <button class="btn btn-sm" onclick="openEditLeadModal(${esc(JSON.stringify(JSON.stringify(l)))})" title="Editar">✏️</button>
          <button class="btn btn-sm" onclick="quickStatus(${esc(String(l.id))})" title="Status">🔄</button>
          <button class="btn btn-sm" onclick="quickNote(${esc(String(l.id))})" title="Nota">📝</button>
          <button class="btn btn-sm btn-danger" onclick="deleteLead(${esc(String(l.id))})" title="Excluir">🗑</button>
        </td>`;
      tbody.appendChild(tr);
    });
    renderPagination(total,perPage);
  }catch(e){tbody.innerHTML=`<tr><td colspan="7" style="color:var(--red)">${esc(e.message)}</td></tr>`;}
}

function renderPagination(total,perPage){
  const pages=Math.ceil(total/perPage);
  const pg=document.getElementById('leadsPagination');
  if(pages<=1){pg.innerHTML='';return;}
  let html=`<button class="btn btn-sm"${leadsPage<=1?' disabled':''} onclick="leadsPage--;loadLeads()">&laquo;</button>`;
  for(let i=1;i<=pages&&i<=10;i++){html+=`<button class="btn btn-sm${i===leadsPage?' btn-p':''}" onclick="leadsPage=${i};loadLeads()">${i}</button>`;}
  if(pages>10)html+=`<span style="color:var(--t2);font-size:12px">...${pages}</span>`;
  html+=`<button class="btn btn-sm"${leadsPage>=pages?' disabled':''} onclick="leadsPage++;loadLeads()">&raquo;</button>`;
  pg.innerHTML=html;
}

        <div class="appt-left">
          <div class="appt-name">${esc(a.name||a.lead_name||'—')}</div>
          <div class="appt-email">${esc(a.email||'')}</div>
        </div>
        <div class="appt-date">${fmtDate(a.date||a.datetime)}</div>
        <span class="badge" style="background:${statusColor}20;color:${statusColor}">${esc(a.status||'pendente')}</span>
        <button class="btn btn-sm" onclick="toggleApptStatus('${esc(String(a.id))}','${a.status==='confirmado'?'pendente':'confirmado'}')">${a.status==='confirmado'?'⏸':'✅'}</button>`;
      el.appendChild(item);
    });
  }catch(e){el.innerHTML=`<p style="color:var(--red);font-size:13px">Erro: ${esc(e.message)}</p>`;}
}

async function toggleApptStatus(id,newStatus){
  try{await api(`/appointments/${id}`,{method:'PUT',body:{status:newStatus}});toast('Status atualizado');loadAppointments();}catch(e){toast('Erro: '+e.message,false);}
}

/* ══════════════════════════════════════════════
   TAB 5: DASHBOARD
   ══════════════════════════════════════════════ */
async function loadDashboard(){
  // Stats + Chart
  const cardsEl=document.getElementById('dashCards');
  const chartEl=document.getElementById('dashChart');
  cardsEl.innerHTML='<div class="stat-card"><div class="val">...</div><div class="lbl">Carregando</div></div>';
  chartEl.innerHTML='';
  try{
    const d=await api('/dashboard');
    const stats=[
      {val:d.total_leads??'—',lbl:'Total Leads'},
      {val:d.new_leads_7d??'—',lbl:'Novos (7d)'},
      {val:d.emails_7d??'—',lbl:'Emails (7d)'},
      {val:d.appointments_7d??'—',lbl:'Agendamentos (7d)'},
      {val:d.whatsapp_today??'—',lbl:'WhatsApp Hoje'}
    ];
    cardsEl.innerHTML='';
    stats.forEach(s=>{
      const c=document.createElement('div');c.className='stat-card';
      c.innerHTML=`<div class="val">${esc(String(s.val))}</div><div class="lbl">${esc(s.lbl)}</div>`;
      cardsEl.appendChild(c);
    });
    // Bar chart
    const byStatus=d.leads_by_status||{};
    const maxVal=Math.max(1,...Object.values(byStatus));
    chartEl.innerHTML='';
    STATUSES.forEach(s=>{
      const count=byStatus[s]||0;
      const pct=Math.round((count/maxVal)*100);
      chartEl.innerHTML+=`<div class="bar-row"><div class="bar-label" style="color:${STATUS_COLORS[s]}">${STATUS_LABELS[s]}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${STATUS_COLORS[s]}"></div></div><div class="bar-val">${count}</div></div>`;
    });
    // Stale leads
    const stale=d.stale_leads||[];
    const staleBody=document.getElementById('staleBody');
    if(stale.length===0){staleBody.innerHTML='<tr><td colspan="3" style="text-align:center;color:var(--t2);padding:16px">Nenhum lead inativo</td></tr>';}
    else{staleBody.innerHTML='';stale.forEach(l=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${esc(l.name)}</td><td>${esc(l.phone||'—')}</td><td>${l.days_inactive||daysSince(l.last_contact)}d</td>`;
      staleBody.appendChild(tr);
    });}
  }catch(e){cardsEl.innerHTML=`<p style="color:var(--red)">Erro: ${esc(e.message)}</p>`;}

  // Suggestions
  loadSuggestions();
}

async function loadSuggestions(){
  const el=document.getElementById('suggGrid');
  el.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  try{
    const data=await api('/suggestions');
    const suggs=Array.isArray(data)?data:(data.suggestions||data.items||[]);
    if(suggs.length===0){el.innerHTML='<p style="color:var(--t2);font-size:13px">Nenhuma sugestao no momento.</p>';return;}
    el.innerHTML='';
    suggs.forEach(s=>{
      const card=document.createElement('div');card.className='sugg-card';
      const priBadge=s.priority?`<span class="badge badge-${esc(s.priority)}">${esc(s.priority)}</span>`:'';
      card.innerHTML=`
        <div class="sugg-title">${esc(s.title||s.action)} ${priBadge}</div>
        <div class="sugg-desc">${esc(s.description||'')}</div>
        <button class="btn btn-sm btn-p" onclick="execSuggestion('${esc(String(s.lead_id||''))}','${esc(s.action||s.type||'')}')">Executar</button>`;
      el.appendChild(card);
    });
  }catch(e){el.innerHTML=`<p style="color:var(--red);font-size:13px">Erro: ${esc(e.message)}</p>`;}
}

async function execSuggestion(leadId,action){
  if(!leadId){toast('Lead ID ausente',false);return;}
  try{await api(`/suggestions/${leadId}/execute`,{method:'POST',body:{action}});toast('Sugestao executada');loadDashboard();}catch(e){toast('Erro: '+e.message,false);}
}

/* ── Init ── */
loadPipeline();
</script>
