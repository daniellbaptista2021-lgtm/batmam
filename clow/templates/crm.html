<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050510">
<link rel="icon" type="image/png" href="/static/brand/favicon.png">
<title>CRM — Clow</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#050510;color:#e4e4e7;font-family:system-ui,-apple-system,sans-serif}

.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:#0a0a1a;border-bottom:1px solid #1a1a2e;
  height:44px;flex-shrink:0;
}
.top-left{display:flex;align-items:center;gap:10px}
.top-left img{height:24px}
.top-left .label{font-weight:700;font-size:15px;color:#7c5cfc}
.back-link{color:#71717a;font-size:13px;text-decoration:none;transition:color .2s}
.back-link:hover{color:#e4e4e7}
.top-right{display:flex;align-items:center;gap:12px}
.cfg-link{color:#71717a;font-size:13px;text-decoration:none;transition:color .2s;cursor:pointer}
.cfg-link:hover{color:#e4e4e7}

.crm-frame{
  width:100%;height:calc(100vh - 44px);border:none;background:#1f2937;
}

.loading-overlay{
  position:fixed;top:44px;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:center;
  background:#050510;z-index:10;transition:opacity .4s;
}
.spinner{width:36px;height:36px;border:3px solid #1a1a2e;border-top-color:#7c5cfc;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Setup screen */
.setup-screen{
  display:none;position:fixed;top:44px;left:0;right:0;bottom:0;
  background:#050510;z-index:20;
  flex-direction:column;align-items:center;justify-content:center;
}
.setup-card{
  background:#0a0a1a;border:1px solid #1a1a2e;border-radius:12px;
  padding:32px;max-width:440px;width:90%;
}
.setup-card h2{font-size:18px;margin-bottom:4px}
.setup-card p.sub{color:#71717a;font-size:13px;margin-bottom:20px}
.setup-card label{display:block;font-weight:600;font-size:13px;margin-bottom:4px;margin-top:14px}
.setup-card input{
  width:100%;padding:8px 12px;background:#050510;color:#e4e4e7;
  border:1px solid #1a1a2e;border-radius:8px;font-size:14px;outline:none;
}
.setup-card input:focus{border-color:#7c5cfc}
.hint{font-size:11px;color:#71717a;margin-top:2px}
.setup-btns{display:flex;gap:10px;margin-top:20px}
.btn{padding:8px 18px;border:1px solid #1a1a2e;border-radius:8px;background:#0a0a1a;color:#e4e4e7;font-size:13px;cursor:pointer;transition:all .2s}
.btn:hover{border-color:#7c5cfc;color:#fff}
.btn-primary{background:#7c5cfc;border-color:#7c5cfc;color:#fff}
.btn-primary:hover{background:#6b4ce0}
.msg{margin-top:12px;font-size:13px;padding:8px 12px;border-radius:6px;display:none}
.msg-ok{display:block;background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.msg-err{display:block;background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <a class="back-link" href="/">&larr; voltar</a>
    <img src="/static/brand/logo-sidebar.png" alt="Clow">
    <span class="label">CRM</span>
  </div>
  <div class="top-right">
    <span class="cfg-link" onclick="showSetup()">Configuracao</span>
  </div>
</div>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
</div>

<div class="setup-screen" id="setup">
  <div class="setup-card">
    <h2>Configuracao do CRM</h2>
    <p class="sub">Conecte seu painel de atendimento para gerenciar tudo dentro do Clow.</p>
    <label>URL do Painel</label>
    <input type="text" id="cfgUrl" placeholder="https://ads.seudominio.com.br">
    <div class="hint">URL completa do seu painel de atendimento (sem barra final).</div>
    <label>Email</label>
    <input type="email" id="cfgEmail" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="cfgPass" placeholder="sua senha">
    <div class="setup-btns">
      <button class="btn" onclick="testSetup()">Testar</button>
      <button class="btn btn-primary" onclick="saveSetup()">Salvar e Conectar</button>
      <button class="btn" onclick="cancelSetup()">Cancelar</button>
    </div>
    <div class="msg" id="setupMsg"></div>
  </div>
</div>

<iframe id="crmFrame" class="crm-frame" style="display:none" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

<script>
const API = '/api/v1/crm';

async function init() {
  try {
    const res = await fetch(API + '/config');
    const cfg = await res.json();
    if (cfg.configured && cfg.url) {
      loadCRM();
    } else {
      showSetup();
    }
  } catch {
    showSetup();
  }
}

function loadCRM() {
  const frame = document.getElementById('crmFrame');
  const loader = document.getElementById('loader');
  document.getElementById('setup').style.display = 'none';
  loader.style.display = 'flex';
  loader.style.opacity = '1';

  // Carrega Chatwoot via proxy Nginx (sem X-Frame-Options)
  frame.src = '/crm-embed/app/login';
  frame.style.display = 'block';

  frame.onload = function() {
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 400);
  };
  setTimeout(() => { loader.style.opacity = '0'; setTimeout(() => loader.style.display = 'none', 400); }, 8000);
}

function showSetup() {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('crmFrame').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  fetch(API + '/config').then(r => r.json()).then(d => {
    if (d.url) document.getElementById('cfgUrl').value = d.url;
  }).catch(() => {});
}

function cancelSetup() {
  const frame = document.getElementById('crmFrame');
  if (frame.src && frame.src !== 'about:blank') {
    document.getElementById('setup').style.display = 'none';
    frame.style.display = 'block';
  }
}

async function testSetup() {
  const msg = document.getElementById('setupMsg');
  msg.className = 'msg'; msg.style.display = 'none';
  const url = document.getElementById('cfgUrl').value.trim();
  const email = document.getElementById('cfgEmail').value.trim();
  const pass = document.getElementById('cfgPass').value.trim();
  if (!url || !email || !pass) { msg.textContent = 'Preencha todos os campos'; msg.className = 'msg msg-err'; return; }
  try {
    const r = await fetch(API + '/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, email, password: pass, test_only: true})
    });
    const d = await r.json();
    if (d.error) { msg.textContent = d.error; msg.className = 'msg msg-err'; }
    else { msg.textContent = 'Conexao OK! ' + (d.message || ''); msg.className = 'msg msg-ok'; }
  } catch (e) { msg.textContent = 'Erro: ' + e.message; msg.className = 'msg msg-err'; }
}

async function saveSetup() {
  const msg = document.getElementById('setupMsg');
  msg.className = 'msg'; msg.style.display = 'none';
  const url = document.getElementById('cfgUrl').value.trim();
  const email = document.getElementById('cfgEmail').value.trim();
  const pass = document.getElementById('cfgPass').value.trim();
  if (!url || !email || !pass) { msg.textContent = 'Preencha todos os campos'; msg.className = 'msg msg-err'; return; }
  try {
    const r = await fetch(API + '/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url, email, password: pass})
    });
    const d = await r.json();
    if (d.error) { msg.textContent = d.error; msg.className = 'msg msg-err'; }
    else {
      msg.textContent = 'Conectado!'; msg.className = 'msg msg-ok';
      setTimeout(() => loadCRM(), 1000);
    }
  } catch (e) { msg.textContent = 'Erro: ' + e.message; msg.className = 'msg msg-err'; }
}

init();
</script>
</body>
</html>
