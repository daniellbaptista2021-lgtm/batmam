<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050510">
    <meta name="description" content="Clow - AI Code Agent | Inteligência Infinita • Possibilidades Premium">

    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Clow">
    <link rel="apple-touch-icon" href="/static/brand/icon.png">
    <link rel="icon" type="image/png" href="/static/brand/favicon.png">

    <title>Clow — Inteligência Infinita</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050510;
            --bg-base: #0A0A1A;
            --bg-elevated: #0F0F24;
            --bg-surface: #14142E;
            --text-primary: #E8E8F0;
            --text-secondary: #9898B8;
            --text-muted: #585878;
            --purple: #9B59FC;
            --blue: #4A9EFF;
            --green: #4ADE80;
            --red: #F87171;
            --border: rgba(100, 100, 180, 0.12);
            --gradient-primary: linear-gradient(135deg, #9B59FC 0%, #4A9EFF 100%);
            --purple-glow: rgba(155, 89, 252, 0.2);
            --font-sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            font-family: var(--font-sans);
            background: var(--bg-deep);
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
            background:
                repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(100,100,180,.03) 10px, rgba(100,100,180,.03) 11px),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse at 50% 40%, rgba(155,89,252,.08) 0%, rgba(74,158,255,.04) 30%, transparent 60%);
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            filter: blur(1px);
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-30px) translateX(10px); opacity: 0.6; }
            50% { transform: translateY(-15px) translateX(-10px); opacity: 0.4; }
            75% { transform: translateY(-40px) translateX(5px); opacity: 0.5; }
        }

        .container {
            text-align: center;
            color: var(--text-primary);
            padding: 24px;
            max-width: 420px;
            position: relative;
            z-index: 2;
        }

        .infinity-logo {
            height: 100px;
            display: block;
            margin: 0 auto 12px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(155,89,252,.25)) drop-shadow(0 0 20px rgba(74,158,255,.15));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        h1 {
            display: none;
        }

        .lens-flare {
            width: 200px;
            height: 1px;
            margin: 12px auto 16px;
            background: linear-gradient(90deg, transparent, rgba(155,89,252,.5), rgba(74,158,255,.5), transparent);
            box-shadow: 0 0 10px rgba(155,89,252,.3);
            border-radius: 1px;
        }

        .tagline {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .tagline .dot { color: var(--purple); }

        .status-card {
            padding: 14px 24px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .status-card.online {
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: var(--green);
        }
        .status-card.offline {
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--red);
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
            50% { opacity: 0.5; box-shadow: 0 0 8px 3px currentColor; }
        }

        .open-btn {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 12px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .open-btn:active { transform: scale(0.96); }
        .open-btn:hover { box-shadow: 0 0 30px var(--purple-glow); filter: brightness(1.1); }

        .install-btn {
            display: none;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--purple);
            padding: 12px 28px;
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }
        .install-btn:hover { background: rgba(155, 89, 252, 0.1); border-color: var(--purple); }

        .hints {
            font-size: 10px;
            color: var(--text-muted);
            line-height: 1.8;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--purple), var(--blue)); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="/static/brand/logo.png" alt="Clow" class="infinity-logo">
        <div class="lens-flare"></div>
        <p class="tagline">INTELIG&Ecirc;NCIA INFINITA <span class="dot">&bull;</span> POSSIBILIDADES PREMIUM</p>

        <div class="status-card online" id="statusCard">
            <span class="status-dot"></span>
            <span id="statusLabel">Sistema online</span>
        </div>

        <a href="/" class="open-btn">Abrir Terminal</a><br>

        <button class="install-btn" id="installBtn">Instalar App</button>

        <div class="hints">
            <p>iPhone: Compartilhar > Adicionar a Tela de Inicio</p>
            <p>Android: o botao "Instalar App" aparece automaticamente</p>
        </div>
    </div>

    <script>
        // Particles
        (function(){
            const isMobile = window.innerWidth < 769;
            const count = isMobile ? 8 : 20;
            const colors = ['#9B59FC', '#4A9EFF'];
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const s = Math.random() * 2 + 2;
                p.style.width = s + 'px';
                p.style.height = s + 'px';
                p.style.top = Math.random() * 100 + '%';
                p.style.left = Math.random() * 100 + '%';
                p.style.backgroundColor = colors[i % 2];
                p.style.animation = 'floatParticle ' + (15 + Math.random() * 25) + 's ease-in-out ' + (Math.random() * 10) + 's infinite';
                document.body.appendChild(p);
            }
        })();

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/service-worker.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }

        // Install prompt
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'inline-block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                await deferredPrompt.userChoice;
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });

        // Online/Offline status
        window.addEventListener('online', () => {
            document.getElementById('statusCard').className = 'status-card online';
            document.getElementById('statusLabel').textContent = 'Sistema online';
        });
        window.addEventListener('offline', () => {
            document.getElementById('statusCard').className = 'status-card offline';
            document.getElementById('statusLabel').textContent = 'Sem conexao';
        });
        if (!navigator.onLine) {
            document.getElementById('statusCard').className = 'status-card offline';
            document.getElementById('statusLabel').textContent = 'Sem conexao';
        }
    </script>
</body>
</html>
