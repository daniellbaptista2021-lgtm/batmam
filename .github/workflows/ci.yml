name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (basic syntax check)
        run: python -m py_compile clow/agent.py clow/cli.py clow/config.py clow/hooks.py clow/permissions.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Check import health
        run: |
          python -c "from clow.hooks import HookRunner; print('hooks OK')"
          python -c "from clow.permissions import PermissionLevel; print('permissions OK')"
          python -c "from clow.sandbox import Sandbox; print('sandbox OK')"
          python -c "from clow.lsp import LSPManager; print('lsp OK')"
          python -c "from clow.oauth import generate_pkce; print('oauth OK')"
          python -c "from clow.tenancy import TenantManager; print('tenancy OK')"
          python -c "from clow.lifecycle import acquire_lock; print('lifecycle OK')"
