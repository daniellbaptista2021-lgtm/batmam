name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Check import health
        run: |
          python -c "from clow.agent import Agent; print('agent OK')"
          python -c "from clow.hooks import HookRunner; print('hooks OK')"
          python -c "from clow.skills.loader import list_all_skills; print('skills OK')"
          python -c "from clow.tools.base import create_default_registry; print('tools OK')"

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn 'sk-ant-' clow/ --include='*.py' | grep -v 'test_' | grep -v '.pyc'
