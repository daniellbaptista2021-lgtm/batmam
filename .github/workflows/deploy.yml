name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install fastapi uvicorn httpx anthropic openai pydantic pytest
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -x
      - name: Check for hardcoded secrets
        run: "! grep -rn 'sk-ant-' clow/ --include='*.py' | grep -v 'test_' | grep -v '.pyc'"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/clow
            git pull origin main
            source .venv/bin/activate
            pip install -e "." -q 2>/dev/null
            systemctl restart clow
            sleep 4
            if curl -sf http://localhost:8001/health > /dev/null; then
              echo "Deploy OK"
            else
              echo "Deploy FAILED"
              journalctl -u clow --no-pager -n 10
              exit 1
            fi
